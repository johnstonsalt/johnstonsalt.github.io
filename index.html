
<!DOCTYPE html>
    <head>
        <title>BASMAAAATI BASMATI RICE</title>
        
        <style>
                body, html { padding: 0; margin: 0; background: whitesmoke; color: #404040; font-family: sans-serif; font-size: 1.5em; }
                .btn { font-size: 1.1em; outline: 1px solid #ABABAB; border: none; padding: 0.2em 0.8em; background: #EFEFEF; display: inline-block; margin: 0.5em; color: black; text-decoration: none; }
                .btn:hover { background: #CDCDCD; cursor: pointer; };
        </style>
    </head>
    <body>
        <br />
        <br />
        <div style="text-align: center;">
            <div>current IP is:</div>
            <div id="ipdiv" style="font-size: 2.7em; font-weight: bold;"></div>
            
            <br />

            <a class="btn" href="" data-route="/">active players</a> <br />
            <a class="btn" href="" data-route="/stats">player stats</a> <br />
            <a class="btn" href="" data-route="/peaceful" >peaceful players</a>
        </div>

        <script>
            var ip;
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) { btns[i].hidden = true; }

            async function doTheShit() {
                // ip
                var ipres = await fetch("https://raw.githubusercontent.com/johnstonalt/ip-updates/refs/heads/main/README.md", { cache: "no-store" } );
                ip = await ipres.text();
                ip = ip.replace("# ", "");
                console.log(ip);
                var ipdiv = document.querySelector("#ipdiv");
                ipdiv.innerText = ip;

                // set hrefs
                for (var i = 0; i < btns.length; i++) { 
                    var route = btns[i].getAttribute("data-route");
                    if (route) { btns[i].setAttribute("href", `http://${ip}:3000${route}`); }

                    btns[i].hidden = false; 
                }
            }

            function redir(route) {
                window.location.href = `http://${ip}:3000/${route}`;
            }
 
            doTheShit();
        </script>
    </body>
</html>
