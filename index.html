<!DOCTYPE html>
    <head>
        <title>BASMAAAATI BASMATI RICE</title>
        
        <style>
            body, html { padding: 0; margin: 0; background: whitesmoke; color: #404040; font-family: sans-serif; }
        </style>
    </head>

    <body>
        <br />
        <br />
        <div style="text-align: center; font-size: 2em;">
            <div>current IP is:</div>
            <div id="ipdiv" style="font-size: 2.7em; font-weight: bold;"></div>
            
            <br />

            <button id="btn" onclick="redir('')" style="font-size: 1em; outline: 1px solid #ABABAB; border: none; padding: 0.3em 0.6em;">see active players</button>
            <br />
            <br />
            <button onclick="redir('stats')" style="font-size: 1em; outline: 1px solid #ABABAB; border: none; padding: 0.3em 0.6em;">see player stats</button>
        </div>

        <script>
            var ip;
            var btn = document.querySelector("#btn");
            btn.hidden = true;

            async function doTheShit() {
                // ip
                var ipres = await fetch("https://raw.githubusercontent.com/johnstonalt/ip-updates/refs/heads/main/README.md", { cache: "no-store" } );
                ip = await ipres.text();
                ip = ip.replace("# ", "");
                console.log(ip);
                var ipdiv = document.querySelector("#ipdiv");
                ipdiv.innerText = ip;

                // window.location.href = `http://${ip}:3000`;
            
                btn.hidden = false; 
            }

            function redir(route) {
                window.location.href = `http://${ip}:3000/${route}`;
            }
 
            doTheShit();
        </script>
    </body>
</html>
